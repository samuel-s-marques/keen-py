<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keen - OSINT Dashboard</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- vis-network -->
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="top-nav">
            <div class="logo">
                <i class="fa-solid fa-eye"></i>
                <span>KEEN</span>
            </div>
            <div style="display:flex; align-items:center; gap: 16px;">
                <button id="btn-theme-toggle" class="icon-btn" title="Toggle Light/Dark Theme"><i class="fa-solid fa-sun"></i></button>
                <button id="btn-settings" class="icon-btn" title="Settings"><i class="fa-solid fa-gear"></i></button>
                <div class="server-status">
                    <div class="status-indicator online"></div>
                    <span>Server Online</span>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- Left Sidebar: Workspaces -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2><i class="fa-solid fa-folder-tree"></i> Workspaces</h2>
                    <button id="btn-new-workspace" class="icon-btn" title="New Workspace">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <div class="workspace-list" id="workspace-list">
                    <!-- Loaded dynamically -->
                </div>
            </aside>

            <!-- Center Panel: Active Workspace Data -->
            <main class="center-panel">
                <div class="panel-header">
                    <h2 id="active-workspace-title">No Workspace Selected</h2>
                    <div class="tabs">
                        <button class="tab active" data-target="tab-graph">Graph Map</button>
                        <button class="tab" data-target="tab-nodes">Nodes (<span id="count-nodes">0</span>)</button>
                        <button class="tab" data-target="tab-edges">Edges (<span id="count-edges">0</span>)</button>
                    </div>
                </div>

                <div class="tab-content active" id="tab-graph">
                    <div class="graph-wrapper" style="position: relative; width: 100%; height: 100%; display: flex; flex: 1; flex-direction: column;">
                        <div class="graph-toolbar">
                            <button id="btn-layout-force" class="graph-btn active" title="Force Directed Layout"><i class="fa-solid fa-asterisk"></i></button>
                            <button id="btn-layout-hierarchical" class="graph-btn" title="Hierarchical Layout"><i class="fa-solid fa-sitemap"></i></button>
                            <button id="btn-layout-circle" class="graph-btn" title="Circular Layout"><i class="fa-solid fa-circle-notch"></i></button>
                            <div class="toolbar-divider"></div>
                            <button id="btn-add-edge" class="graph-btn" title="Draw Edge"><i class="fa-solid fa-link"></i></button>
                            <div class="toolbar-divider"></div>
                            <button id="btn-toggle-physics" class="graph-btn active" title="Toggle Physics (Freeze/Unfreeze)"><i class="fa-solid fa-magnet"></i></button>
                            <div class="toolbar-divider"></div>
                            <button id="btn-delete-selected" class="graph-btn" style="color:var(--error);" title="Delete Selected Node(s)/Edge(s)"><i class="fa-solid fa-trash"></i></button>
                        </div>
                        <div id="network-canvas" class="graph-container"></div>
                    </div>
                </div>

                <div class="tab-content" id="tab-nodes">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Type</th>
                                    <th>Value</th>
                                    <th>Timestamp</th>
                                </tr>
                            </thead>
                            <tbody id="nodes-tbody">
                                <!-- Nodes loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="tab-content" id="tab-edges">
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Source ID</th>
                                    <th>Target ID</th>
                                    <th>Relationship</th>
                                </tr>
                            </thead>
                            <tbody id="edges-tbody">
                                <!-- Edges loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>

            <!-- Right Panel: Module Runner -->
            <aside class="right-panel">
                <div class="panel-header right-panel-tabs" style="padding: 10px 10px 0 10px; border-bottom: 1px solid var(--border-color);">
                    <div class="tabs" style="margin-bottom: 0;">
                        <button class="tab right-tab active" data-target="tab-module-runner" style="padding: 10px 16px;"><i class="fa-solid fa-bolt"></i> Runner</button>
                        <button class="tab right-tab" data-target="tab-node-info" style="padding: 10px 16px;"><i class="fa-solid fa-circle-info"></i> Info</button>
                    </div>
                </div>

                <div class="right-tab-content-container" style="flex: 1; min-height: 0; overflow-y: auto;">
                    <div id="tab-module-runner" class="tab-content right-tab-content active" style="padding: 16px;">
                        <div class="module-selector-container">
                            <label for="module-select">Select Module</label>
                            <select id="module-select">
                                <option value="" disabled selected>-- Choose a module --</option>
                            </select>
                        </div>

                        <div id="module-details" class="module-details hidden" style="border-bottom: none; padding-bottom: 0;">
                            <p id="module-description" class="module-desc"></p>
                            <div class="module-meta">
                                <span class="badge" id="module-author"></span>
                                <span class="badge" id="module-version"></span>
                            </div>

                            <form id="module-form" class="module-form">
                                <!-- Options generated dynamically -->
                            </form>

                            <button id="btn-run-module" class="btn-primary">
                                <i class="fa-solid fa-play"></i> Run Module
                            </button>
                        </div>
                    </div>

                    <div id="tab-node-info" class="tab-content right-tab-content" style="padding: 16px;">
                        <div id="node-info-empty" style="color: var(--text-secondary); text-align: center; margin-top: 20px;">Select a node to view its info.</div>
                        <div id="node-info-content" style="display: none; flex-direction: column; gap: 12px; font-size: 0.85rem; color: var(--text-secondary);">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                </div>

                <!-- Terminal -->
                <div class="terminal-container">
                    <div class="terminal-header">
                        <span>Execution Logs</span>
                        <div class="terminal-actions">
                            <button id="btn-clear-term" class="icon-btn small"><i
                                    class="fa-solid fa-eraser"></i></button>
                        </div>
                    </div>
                    <div class="terminal-body" id="terminal-body">
                        <div class="log-line sys-msg">Ready.</div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modal-new-workspace">
        <div class="modal">
            <div class="modal-header">
                <h3>Create Workspace</h3>
                <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Workspace Name</label>
                    <input type="text" id="input-ws-name" placeholder="e.g. target_corp_1">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="input-ws-desc" placeholder="Optional description">
                </div>
                <button id="btn-create-ws" class="btn-primary full-width">Create</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-rename-workspace">
        <div class="modal">
            <div class="modal-header">
                <h3>Rename Workspace</h3>
                <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>New Name</label>
                    <input type="text" id="input-rename-ws" placeholder="New workspace name">
                </div>
                <button id="btn-confirm-rename-ws" class="btn-primary full-width">Rename</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-settings">
        <div class="modal">
            <div class="modal-header">
                <h3>Settings / API Keys</h3>
                <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="settings-locked">
                <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px;">Enter master password to unlock API keys.</p>
                <div class="form-group">
                    <input type="password" id="input-master-password" placeholder="Master Password">
                </div>
                <button id="btn-unlock-settings" class="btn-primary full-width">Unlock</button>
            </div>
            <div class="modal-body hidden" id="settings-unlocked">
                <div class="form-group">
                    <label>Add/Update API Key</label>
                    <div style="display:flex; gap: 8px;">
                        <input type="text" id="input-api-service" placeholder="Service (e.g. SHODAN_API_KEY)" style="flex:1;">
                        <input type="text" id="input-api-key" placeholder="Key" style="flex:2;">
                    </div>
                    <button id="btn-save-api-key" class="btn-primary full-width" style="margin-top: 12px;">Save Key</button>
                </div>
                <div id="api-keys-list" style="margin-top: 16px; font-size: 0.85rem; color: var(--text-secondary); max-height: 200px; overflow-y: auto;">
                    <!-- Keys loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu hidden">
        <div class="context-menu-header">Run Module</div>
        <div id="context-menu-items"></div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
