name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (with dev extras)
        env:
          KEEN_SKIP_DEP_CHECK: "1"
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        env:
          KEEN_SKIP_DEP_CHECK: "1"
        run: pytest --cov --cov-report=term-missing

  lint:
    name: Lint & type-check (informational)
    runs-on: ubuntu-latest
    # Informational for now: the tree isn't fully ruff/pyrefly clean yet, so these
    # report issues without blocking merges. Flip continue-on-error off once clean.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint/type tooling
        run: pip install ruff pyrefly

      - name: Ruff (lint)
        continue-on-error: true
        run: ruff check --output-format=github .

      - name: Ruff (format check)
        continue-on-error: true
        run: ruff format --check .

      - name: Pyrefly (type check)
        continue-on-error: true
        run: pyrefly check
